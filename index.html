<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Arcade Pokémon</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #game-container { width: 100%; max-width: 600px; height: 450px; margin: 20px auto; background: #000; border: 2px solid #e3350d; border-radius: 10px; position: relative; }
        .menu { margin-bottom: 20px; }
        button { background: #e3350d; color: white; border: none; padding: 12px 20px; margin: 5px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #ff4500; transform: scale(1.05); }
        #game { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <h1>🕹️ Meu Arcade Pokémon</h1>
    
    <div class="menu">
        <button onclick="carregar('crystal.gbc')">Pokémon Crystal</button>
        <button onclick="carregar('gold.gbc')">Pokémon Gold</button>
        <button onclick="carregar('yellow.gbc')">Pokémon Yellow</button>
    </div>

    <div id="game-container">
        <div id="game"></div>
    </div>

    <script>
        function carregar(nomeDoArquivo) {
            // Limpa o container anterior
            document.getElementById('game').innerHTML = '';

            // Configuração oficial do EmulatorJS
            window.EJS_player = '#game';
            window.EJS_gameUrl = 'jogos/' + nomeDoArquivo;
            window.EJS_core = 'gbc';
            window.EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/';
            window.EJS_startOnLoaded = true;

            // Insere o loader
            let loader = document.createElement('script');
            loader.src = 'https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/loader.js';
            document.body.appendChild(loader);
        }
    </script>

</body>
</html>
