<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Arcade Pokémon</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #game-area { width: 100%; max-width: 800px; height: 500px; margin: 20px auto; background: #000; border: 2px solid #e3350d; border-radius: 10px; overflow: hidden; }
        .menu { margin-bottom: 20px; }
        button { background: #e3350d; color: white; border: none; padding: 12px 20px; margin: 5px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #ff4500; transform: scale(1.05); }
        iframe { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>

    <h1>🕹️ Meu Arcade Pokémon</h1>
    <p>Selecione seu jogo e divirta-se!</p>
    
    <div class="menu">
        <button onclick="iniciar('crystal.gbc')">Pokémon Crystal</button>
        <button onclick="iniciar('gold.gbc')">Pokémon Gold</button>
        <button onclick="iniciar('yellow.gbc')">Pokémon Yellow</button>
    </div>

    <div id="game-area">
        <div style="padding-top: 200px; color: #555;">Aguardando seleção de jogo...</div>
    </div>

    <script>
        function iniciar(arquivo) {
            const container = document.getElementById('game-area');
            const user = 'tclavrador'; 
            const repo = 'meu-arcade-online';
            
            // Gerando o link direto para a ROM no seu GitHub Pages
            const gameUrl = `https://${user}.github.io/${repo}/jogos/${arquivo}`;

            // Injetando o Iframe do emulador oficial
            container.innerHTML = `
                <iframe 
                    src="https://emulatorjs.org/emu/?game=${encodeURIComponent(gameUrl)}&core=gbc" 
                    allowfullscreen>
                </iframe>
            `;
        }
    </script>

</body>
</html>
