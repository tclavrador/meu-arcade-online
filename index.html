<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Arcade Pokémon</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        #game-container { width: 100%; max-width: 640px; height: 480px; margin: 20px auto; background: #000; border: 2px solid #555; }
        .menu { margin-bottom: 20px; }
        button { background: #e3350d; color: white; border: none; padding: 10px 15px; margin: 5px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ff4500; }
        #game { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <h1>🕹️ Meu Arcade Pokémon</h1>
    
    <div class="menu">
        <button onclick="iniciar('crystal.gbc')">Pokémon Crystal</button>
        <button onclick="iniciar('gold.gbc')">Pokémon Gold</button>
        <button onclick="iniciar('yellow.gbc')">Pokémon Yellow</button>
    </div>

    <div id="game-container">
        <div id="game"></div>
    </div>

    <script>
        function iniciar(arquivo) {
            document.getElementById('game').innerHTML = '';

            window.EJS_player = '#game';
            window.EJS_gameUrl = 'jogos/' + arquivo; 
            window.EJS_core = 'gbc';
            
            // Mudamos para o servidor do UNPKG, que é mais estável para o GitHub
            window.EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/';
            window.EJS_startOnLoaded = true;

            let script = document.createElement('script');
            // Também mudamos a origem do loader
            script.src = 'https://cdn.jsdelivr.net/gh/EmulatorJS/EmulatorJS@latest/data/loader.js';
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
