<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Arcade Pokémon</title>
    <style>
        body { background: #1a1a1a; color: white; font-family: sans-serif; text-align: center; margin: 0; padding: 20px; }
        #game-area { width: 100%; max-width: 600px; height: 450px; margin: 20px auto; background: #000; border: 2px solid #e3350d; }
        .menu { margin-bottom: 20px; }
        button { background: #e3350d; color: white; border: none; padding: 10px 20px; margin: 5px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        button:hover { background: #ff4500; }
    </style>
</head>
<body>

    <h1>🕹️ Meu Arcade Pokémon</h1>
    
    <div class="menu">
        <button onclick="iniciar('crystal.gbc')">Pokémon Crystal</button>
        <button onclick="iniciar('gold.gbc')">Pokémon Gold</button>
        <button onclick="iniciar('yellow.gbc')">Pokémon Yellow</button>
    </div>

    <div id="game-area">
        <div id="game"></div>
    </div>

    <script>
        function iniciar(arquivo) {
            // Remove qualquer instância anterior do emulador
            document.getElementById('game').innerHTML = '';
            
            // Configurações básicas
            window.EJS_player = '#game';
            window.EJS_gameUrl = 'jogos/' + arquivo;
            window.EJS_core = 'gbc';
            
            // Usando o servidor estável do BstExternal (muito usado no GitHub Pages)
            window.EJS_pathtodata = 'https://rawcdn.githack.com/EmulatorJS/EmulatorJS/main/data/';
            window.EJS_startOnLoaded = true;

            // Criar o script de forma limpa
            let script = document.createElement('script');
            script.src = 'https://rawcdn.githack.com/EmulatorJS/EmulatorJS/main/data/loader.js';
            document.body.appendChild(script);
        }
    </script>
</body>
</html>
